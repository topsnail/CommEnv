name = "commenv"
compatibility_date = "2024-01-01"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.production.kv_namespaces]
binding = "KV"
id = "Commenv_KV"

[env.production.r2_buckets]
binding = "R2"
bucket_name = "commenv-r2"

[[env.production.vars]]
ADMIN_PASSWORD = "YOUR_SECURE_ADMIN_PASSWORD"

[[rules]]
type = "ESModule"
globs = ["**/*.js"]
